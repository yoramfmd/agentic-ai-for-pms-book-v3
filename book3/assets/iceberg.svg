<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    .head { font-size: 13.5px; font-weight: 700; }
    .item { font-size: 12px; fill: #1a1a1a; }
    .sub  { font-size: 11px; fill: #5f5e5a; }
    .cap  { font-size: 11px; fill: #5f5e5a; font-style: italic; }
    .wl   { font-size: 10px; fill: #888780; letter-spacing: 0.05em; }
  </style>

  <text x="380" y="26" class="cap" text-anchor="middle">When data moves between systems, the surface travels and the meaning stays behind.</text>

  <!-- waterline -->
  <line x1="40" y1="150" x2="720" y2="150" stroke="#185FA5" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="40" y="144" class="wl">WATERLINE</text>
  <text x="720" y="144" class="wl" text-anchor="end">WHAT MOVES BETWEEN SYSTEMS</text>

  <!-- tip above water (wider so the label fits) -->
  <path d="M380 58 L300 150 L460 150 Z" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <text x="380" y="114" class="head" fill="#185FA5" text-anchor="middle">The tip</text>
  <text x="380" y="134" class="sub" text-anchor="middle">fields, values, rows</text>

  <!-- mass below water -->
  <path d="M300 150 L460 150 L580 340 L180 340 Z" fill="#f1f3f5" stroke="#b4b2a9" stroke-width="1.2"/>
  <text x="380" y="186" class="head" fill="#5f5e5a" text-anchor="middle">The mass below</text>
  <text x="380" y="214" class="item" text-anchor="middle">Relationships</text>
  <text x="380" y="232" class="sub" text-anchor="middle">the web that connected the records</text>
  <text x="380" y="262" class="item" text-anchor="middle">Calculated meaning</text>
  <text x="380" y="280" class="sub" text-anchor="middle">what a number actually represents</text>
  <text x="380" y="310" class="item" text-anchor="middle">Security context</text>
  <text x="380" y="328" class="sub" text-anchor="middle">who may see what, and why</text>
</svg>
